<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track & Trust</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f7f7; }
        header { background: #2c3e50; padding: 15px; color: #fff; display: flex; justify-content: space-between; align-items: center; }
        header a { color: #fff; text-decoration: none; margin-left: 15px; }
        .container { padding: 20px; }
        footer { text-align: center; padding: 15px; background: #eee; margin-top: 30px; }
    </style>
</head>
<body>

<header>
    <div><strong>Track & Trust</strong></div>

    <div>
        {% if session.username %}
            Logged in as: {{ session.username }}
            <a href="/logout">Logout</a>
        {% endif %}
    </div>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2025 Track & Trust | Secure Chemical Supply Chain Monitoring
</footer>

</body>
</html>
