<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Dashboard - Track & Trust</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<style>
body { background:#f9f9fb; font-family: Arial; }
.navbar { background: linear-gradient(90deg, #007bff, #00c6ff); color:white; padding:15px; display:flex; justify-content:space-between; align-items:center; }
.navbar a { color:white; font-weight:bold; text-decoration:none; margin-left:15px; }
#map { height:400px; border-radius:12px; }
.card { border-radius:12px; margin-bottom:20px; padding:15px; background:white; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<nav class="navbar">
  <div>Driver Dashboard</div>
  <div>
    <span>{{ username }} ({{ role }})</span>
    <a href="{{ url_for('logout') }}">Logout</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- Assigned Route -->
  <div class="card">
    <h5>Assigned Route</h5>
    <div id="map"></div>
  </div>

  <!-- Vehicle Status -->
  <div class="card">
    <h5>Vehicle Status</h5>
    <ul id="vehicleStatus">
      <li>Loading...</li>
    </ul>
  </div>

</div>

<script>
const socket = io();

// Leaflet Map
const map = L.map('map').setView([19.0760,72.8777], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
let routeLine = L.polyline([], {color: 'blue'}).addTo(map);
let marker = L.marker([19.0760,72.8777]).addTo(map);

// Socket updates
socket.on("vehicle_update", data => {
  if (data.vehicle_id === "{{ username }}") {
    const latlng = [data.lat, data.lng];
    routeLine.addLatLng(latlng);
    marker.setLatLng(latlng);

    document.getElementById("vehicleStatus").innerHTML = `<li>Status: ${data.status}</li>
      <li>Latitude: ${data.lat.toFixed(4)}</li>
      <li>Longitude: ${data.lng.toFixed(4)}</li>`;
  }
});
</script>

</body>
</html>
