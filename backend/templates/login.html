<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track & Trust Login</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f7f7f7; }
        .container {
            max-width: 400px; margin: auto; padding: 20px;
            border: 1px solid #ccc; border-radius: 8px; background: white;
        }
        h2 { text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #2c3e50; color: #fff; border: none; cursor: pointer; }
        button:hover { background: #1a242f; }
        .error { color: red; text-align: center; margin-bottom: 10px; }
        a { text-decoration: none; color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 Track & Trust Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/login" method="POST">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <p style="text-align:center; margin-top: 10px;">
        Don't have an account? <a href="/register">Register here</a>
    </p>
</div>

</body>
</html>
